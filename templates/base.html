<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HF Daily Papers{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <a href="/" class="logo">📄<span class="logo-text"> Paper Hub</span></a>
                <a href="/" class="btn btn-sm nav-link" data-nav="hf">HF Papers</a>
                <a href="/arxiv" class="btn btn-sm nav-link" data-nav="arxiv">ArXiv Papers</a>
            </div>
            {% block header_right %}{% endblock %}
            <a href="/setup" class="btn btn-sm nav-right" title="设置">⚙ 设置</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Powered by <a href="https://huggingface.co/papers" target="_blank">Hugging Face</a> + <a href="https://arxiv.org" target="_blank">arXiv</a> + LLM</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
